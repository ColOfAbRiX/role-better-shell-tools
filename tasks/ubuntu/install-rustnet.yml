---
- name: "Check if rustnet is already installed"
  ansible.builtin.stat:
    path: /usr/local/bin/rustnet
  register: rustnet_bin
  tags: better-shell-tools

- name: "Install rustnet"
  when: not rustnet_bin.stat.exists
  block:
    - name: "Rustnet: Get latest release version"
      ansible.builtin.uri:
        url: https://api.github.com/repos/domcyrus/rustnet/releases/latest
        return_content: yes
      register: rustnet_release
      changed_when: false

    - name: "Rustnet: Download rustnet binary"
      become: true
      ansible.builtin.get_url:
        url: "https://github.com/domcyrus/rustnet/releases/download/{{ rustnet_release.json.tag_name }}/rustnet-{{ rustnet_release.json.tag_name }}-x86_64-unknown-linux-gnu.tar.gz"
        dest: "/tmp/rustnet.tar.gz"
        mode: "0644"

    - name: "Rustnet: Create temp extraction directory"
      become: true
      ansible.builtin.file:
        path: /tmp/rustnet-extract
        state: directory
        mode: "0755"

    - name: "Rustnet: Extract and install rustnet"
      become: true
      ansible.builtin.shell:
        cmd: "tar -xzf /tmp/rustnet.tar.gz -C /tmp/rustnet-extract --strip-components=1 && install /tmp/rustnet-extract/rustnet /usr/local/bin/rustnet"

    - name: "Rustnet: Cleanup"
      ansible.builtin.file:
        path: "{{ cleanup_item }}"
        state: absent
      loop:
        - "/tmp/rustnet.tar.gz"
        - "/tmp/rustnet-extract"
      loop_control:
        loop_var: cleanup_item

  tags: better-shell-tools
