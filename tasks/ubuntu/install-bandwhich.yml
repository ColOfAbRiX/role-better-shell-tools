---
- name: "Check if bandwhich is already installed"
  ansible.builtin.stat:
    path: /usr/local/bin/bandwhich
  register: bandwhich_bin
  tags: better-shell-tools

- name: "Install bandwhich"
  when: not bandwhich_bin.stat.exists
  block:
    - name: "Bandwhich: Get latest release version"
      ansible.builtin.uri:
        url: https://api.github.com/repos/imsnif/bandwhich/releases/latest
        return_content: yes
      register: bandwhich_release
      changed_when: false

    - name: "Bandwhich: Download bandwhich binary"
      become: true
      ansible.builtin.get_url:
        url: "https://github.com/imsnif/bandwhich/releases/download/{{ bandwhich_release.json.tag_name }}/bandwhich-{{ bandwhich_release.json.tag_name }}-x86_64-unknown-linux-gnu.tar.gz"
        dest: "/tmp/bandwhich.tar.gz"
        mode: "0644"

    - name: "Bandwhich: Create temp extraction directory"
      become: true
      ansible.builtin.file:
        path: /tmp/bandwhich-extract
        state: directory
        mode: "0755"

    - name: "Bandwhich: Extract and install bandwhich"
      become: true
      ansible.builtin.shell:
        cmd: "tar -xzf /tmp/bandwhich.tar.gz -C /tmp/bandwhich-extract --strip-components=1 && install /tmp/bandwhich-extract/bandwhich /usr/local/bin/bandwhich"

    - name: "Bandwhich: Cleanup"
      ansible.builtin.file:
        path: "{{ cleanup_item }}"
        state: absent
      loop:
        - "/tmp/bandwhich.tar.gz"
        - "/tmp/bandwhich-extract"
      loop_control:
        loop_var: cleanup_item

  tags: better-shell-tools
